services:
  backend:
    build: .
    image: my-backend:latest
    ports:
      - "3000:3000"
    environment:
      - MONGO_UI=mongodb://database-container:27017/cashioDevDb
    depends_on:
      - database-container

  database-container:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
